<!DOCTYPE html>
<!-- Login interface text and information to allow users to sign in-->
<html>
    <!-- Using an external css file for better managment and resuablility-->
    <head> 
        <link rel="stylesheet" href="Login-screen.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="Login-screen.js" defer></script>
    </head>
    <body>
        <!-- Navigation bar for login and sign up-->
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">FlyDream</a>
                 <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="/Front-end/Home-screen/Home-screen.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/Front-end/Login-screen/Login-screen.html">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/Front-end/Login-screen/SignIn-screen.html">Sign-up</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container-fluid d-flex vh-100 p-0">
            <!-- Image side of the login page-->
            <div class="image-side w-50"></div>

            <!-- Creating the form side of the web-page-->
            <div class="form-side w-50">
                <!-- The header of the web-page-->
                <div> 
                    <h1 style=" color: white;">Flying like a dream</h1>
                </div>

                <!--Creating the user login form for the webpage to allow for the process of data-->
                <div class="FlyDreamLogin"> 
                    <form action="/Front-end/Login-screen/Login-screen.html">

                        <!-- Creating seperate divs so that the forms can be spaced properly-->
                        <div class="mb-3">
                            <label for="email">Email:</label><br>
                            <input type="text" id="email" name="email" required><br> 
                        </div>

                        <div class="mb-3">
                            <label for="pass">Password:</label><br>
                            <input type="password" id="pass" name="password" required><br>
                        </div>

                        <!-- Sumbit and button input for the web-page -->
                        <div>
                            <input type="Submit" value="Submit" id="submit">
                            <button type="reset" class="btn btn-secondary">Clear</button>
                        </div>
                    </form>
                <!-- Forms div-->
                </div>
            <!-- Form-side div -->
            </div>
        <!--Container div-->
        </div>
    </body>

</html>
