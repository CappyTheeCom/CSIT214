<!DOCTYPE html>
<html> 
    <!--Home screen CSS-->
    <header>
        <link ref="stylesheet" href="Home-screen.css">
    </header>

    <body>

        <!-- creating the cotainer of the home page-->
        <div class="home-component">

            <!--creating search field to see if anything available-->
            <div class="Search-Field">

                <h2> Look for a flight</h2>

                <form> 


                    <div class="From-flight">
                        <label for="from">From:</label>
                        <input type="text" id="from" placeholder="e.g sydney" required>
                    </div>


                    <div class="To-flight">
                        <label for="to">To:</label>
                        <input type="text" id="to" placeholder="e.g melbourne" required>
                    </div>

                </form>
            </div>

        </div>


    </body>
</html>
