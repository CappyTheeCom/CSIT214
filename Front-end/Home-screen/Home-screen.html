<!DOCTYPE html>
<html> 
    <!--Home screen CSS-->
    <header>
        <link rel="stylesheet" href="Home-screen.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="Home-screen.js" defer></script>
    </header>
    <body>
        <!-- Navigation bar for login and sign up-->
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">FlyDream</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="Home-screen.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/Front-end/Login-screen/Login-screen.html">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/Front-end/Login-screen/SignIn-screen.html">Sign-up</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- creating the cotainer of the home page-->
        <div class="home-component">
            <!--creating search field to see if anything available-->
            <div class="flight-booking">
                <div>
                    <h2 class="flight-title"> Look for a flight</h2>
                </div>

                <form class="form-grid"> 


                    <div class="from-flight">
                        <label for="fromCity">From:</label>
                        <input type="text"  id="fromCity" placeholder="e.g sydney" required>
                    </div>


                    <div class="to-flight">
                        <label for="toCity">To:</label>
                        <input type="text"  id="toCity" placeholder="e.g melbourne" required>
                    </div>

                    <div class="departure-flght">
                        <label for="departure">Departure:</label>
                        <input type="date"  id="departure" placeholder="e.g melbourne" required>
                    </div>

                    <div>
                        <label for="traveller">Travellers: </label>
                        <input type="number" min="1" step="1" id="traveller" required>
                    </div>
                </form>

                <div> 
                    <input type="button" value="submit" id="submit">
                    <button type="reset">Clear</button>
                </div>
            <!-- The flight container-->
            </div>
        </div>
    </body>
</html>
