<!DOCTYPE html>
<html> 
    <!--Home screen CSS-->
    <header>
        <link rel="stylesheet" href="Home-screen.css">
        <script src="Home-screen.js" defer></script>
    </header>

    <body>

        <!-- creating the cotainer of the home page-->
        <div class="home-component">
            <!--creating search field to see if anything available-->
            <div class="flight-booking">
                <div>
                    <h2 class="flight-title"> Look for a flight</h2>
                </div>

                <form class="form-grid"> 


                    <div class="from-flight">
                        <label for="fromCity">From:</label>
                        <input type="text"  id="fromCity" placeholder="e.g sydney" required>
                    </div>


                    <div class="to-flight">
                        <label for="toCity">To:</label>
                        <input type="text"  id="toCity" placeholder="e.g melbourne" required>
                    </div>

                    <div class="departure-flght">
                        <label for="departure">Departure:</label>
                        <input type="date"  id="departure" placeholder="e.g melbourne" required>
                    </div>

                    <div>
                        <label for="traveller">Travellers: </label>
                        <input type="number" min="1" step="1" id="traveller" required>
                    </div>
                </form>

                <div> 
                    <input type="button" value="submit" id="submit">
                    <button type="reset">Clear</button>
                </div>
            <!-- The flight container-->
            </div>

            <!-- Making the sign in option/ sign up-->
            <div class="user-signIn">
                <button type="button">Login-in!</button>
                <button type="button">Sign-up!</button>
            </div>
        </div>
    </body>
</html>
