<!DOCTYPE html>
<head>
    <meta charset="UTF-8"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="bookFlight.js"></script>
</head>
<body>

    <!-- Navigation bar for login and sign up-->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">FlyDream</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="/Front-end/Home-screen/Home-screen.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/Front-end/Login-screen/Login-screen.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/Front-end/Login-screen/SignIn-screen.html">Sign-up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!--Creating list for the flight infor to be present in-->
    <div class="mx-auto p-2 mt-3" style="width: 500px">

        <!--Creating search bar nav for the ticket-->
        <div class="container">
            <nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm rounded-pill" style="margin-top: 56px;">
                <div class="container-fluid justify-content-center">
                    <ul class="navbar-nav justify-content-center">
                        <li class="nav-item border-end border-3 pe-2">
                            <a class="nav-link active" href="/Front-end/bookFlight-screen/bookFlight-screen.html">Flights</a>
                        </li>
                        <li class="nav-item border-end border-3 pe-2">
                            <a class="nav-link" href="/Front-end/bookFlight-screen/bookSeat-screen.html">Seats</a>
                        </li>
                        <li class="nav-item border-end border-3 pe-2">
                            <a class="nav-link" href="/Front-end/bookFlight-screen/bookExtra-screen.html">Extra's</a>
                        </li>
                        <li class="nav-item border-end border-3 pe-2">
                            <a class="nav-link" href="/Front-end/bookFlight-screen/bookDetail.html">Details</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/Front-end/bookFlight-screen/bookPayment.html">Payment</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
        
        <!--Flight display information-->
        <ul class="list-group mx-auto p-4" id="tripList">
            <li class="list-group-item d-flex justify-content-between align-items-start">
                <div class="ms-2 me-auto">
                    <div class="fw-bold">QANTAS</div>
                    <div id="departure">27/05/2026</div>
                    <div id="dep_time">Departure: 1:30pm </div>
                    <div id="arv_time">Arrival: 3:15pm </div>
                    <div id="avSeats">Avialable seats: 2 </div>
                </div>
                <div>
                    <div>
                        <h4 id="tPrice">$245.00</h4>
                    </div>
                    <div class="ms-4 mt-3">
                        <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#baggageModal" id="selectTrip">Select</button>
                    </div>
                </div>
            </li>
        </ul>
    </div>
    
    <!--Creating the pop-up window to allow for the ticket to be purchased-->
    <div class="modal fade" id="baggageModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">

                <div class="modal-header d-flex flex-column align-items-start">
                    <h5 class="modal-title mt-4" id="baggageModalLabel">Baggage</h5>
                    <h5 class="modal-title" id="flightModalLabel">Departing flight</h5>
                    <small class="text-muted" id="modalCitites"></small>
                    <small class="text-muted" id="modalTimes"></small>
                </div>

                <div class="modal-body">
                    <form>
                        <!--Carry on weight-->
                         <div class="form-group mb-1">
                            <label class="form-check-label">Carry-on Weight: </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="carryWeight" id="carryWeight1" value="option1">
                            <label class="form-check-label" for="carryWeight1">7KG</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="carryWeight" id="carryWeight2" value="option2">
                            <label class="form-check-label" for="carryWeight2">20KG + $20</label>
                        </div>

                        <!--Creating checked baggage section-->
                        <div class="form-group mt-3 mb-1">
                            <label class="form-check-label">Checked-baggage: </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="baggageWeight" id="baggageWeight1" value="option1">
                            <label class="form-check-label" for="baggageWeight">None</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="baggageWeight" id="baggageWeight1" value="option1">
                            <label class="form-check-label" for="baggageWeight">15KG + $29</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="baggageWeight" id="baggageWeight1" value="option1">
                            <label class="form-check-label" for="baggageWeight">20KG + $36</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="baggageWeight" id="baggageWeight1" value="option1">
                            <label class="form-check-label" for="baggageWeight">30KG + $54</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="confirmBtn">Confirm</button>
                </div>
            </div>
        </div>
    </div>
</body>
